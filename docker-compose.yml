version: '3.8'

services:
  db:
    image: postgres:14.2
    environment:
      TZ: UTC
      PGTZ: UTC
      POSTGRES_PASSWORD: $PG_PASSWORD
    volumes:
      - ./api-metal/tmp/db:/var/lib/postgresql/data
    ports:
      - 5433:5432
  api-metal:
    stdin_open: true
    tty: true
    build:
      context: ./api-metal
      args:
        WORKDIR: app
    command: /bin/sh -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    environment:
      POSTGRES_PASSWORD: $PG_PASSWORD
      API_DOMAIN: "localhost:8080"
      APP_URL: "http://localhost:3000"
    volumes:
      - ./api-metal:/app
    depends_on:
      - db
    ports:
      - "3000:3000"

  front-metal:
    build:
      context: ./front-metal
      args:
        WORKDIR: app
        CONTAINER_PORT: 3000
        API_URL: "http://api-metal:3000"
        API_URL_BROWSER: "http://localhost:3000"
    command: yarn run dev
    volumes:
      - ./front-metal:/app
    depends_on:
      - api-metal
    ports:
      - "8080:3000"